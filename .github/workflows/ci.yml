name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++ cmake ninja-build ccache

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja ccache || true

      - name: Cache pip + ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.ccache
            ~/Library/Caches/ccache
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('pyproject.toml', 'CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-pip-

      - name: Install package (editable + dev)
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: "4"
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke test
        run: |
          python -c "import riskpy; from riskpy import FactorModel, FourierTransform, LossTriangle; print(riskpy.__version__)"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # Headless-friendly path: no Tk required for core APIs
  headless-import:
    name: Headless import (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++ cmake ninja-build
      - name: Install (no GUI)
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Headless import must succeed
        run: |
          python - <<'PY'
          import riskpy
          from riskpy import FactorModel, FourierTransform, MonteCarloSimulator
          assert riskpy.__version__
          print("headless OK", riskpy.__version__)
          # UnderwritingApp may or may not load; import of package itself must not crash
          PY
