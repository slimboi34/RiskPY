name: Publish to PyPI

# Super simple release path:
#   1. Bump version in pyproject.toml
#   2. git tag v0.2.6 && git push origin v0.2.6
#   3. This workflow builds sdist (+ wheels) and uploads via Trusted Publishing
#
# One-time PyPI setup (Trusted Publisher):
#   https://pypi.org/manage/project/open-riskpy/settings/publishing/
#   Owner: slimboi34  Repo: RiskPY  Workflow: publish.yml  Environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: "Also publish to TestPyPI"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++ cmake ninja-build
          python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (manylinux aarch64 optional skip)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
        continue-on-error: true

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_* pp*"
          CIBW_ARCHS_MACOS: "auto"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_ALL_LINUX: >
            (yum install -y gcc-c++ cmake ninja-build ||
             (apt-get update && apt-get install -y g++ cmake ninja-build) || true)
          CIBW_BEFORE_BUILD: "pip install ninja pybind11"
          # PIC required so static miniz/OpenXLSX can link into the pybind .so on Linux
          CIBW_ENVIRONMENT: "CMAKE_BUILD_PARALLEL_LEVEL=2 CMAKE_ARGS=-DCMAKE_POSITION_INDEPENDENT_CODE=ON"
          # Smoke-test the installed wheel only (no matplotlib/Pillow in manylinux)
          CIBW_TEST_COMMAND: "python -c \"import riskpy; from riskpy import FourierTransform, FactorModel; print(riskpy.__version__)\""

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    name: Upload to PyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    # Note: Trusted Publisher on PyPI should list workflow "publish.yml".
    # Environment name is optional; omit it so the job is not stuck queued.
    permissions:
      id-token: write  # Trusted Publishing (OIDC) — no API token secret needed
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show artifacts
        run: |
          mkdir -p upload
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} upload/ \;
          ls -lah upload/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload/
          skip-existing: true
          verbose: true

      - name: Publish to TestPyPI (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_testpypi }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload/
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
